<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Previsão do tempo</title>
</head>
<body>
    <div class="caixa-maior">
        <input class="input-cidade" placeholder="Digite o nome da Cidade">
        <button class="botao-busca" onclick="cliquenoBotao()">
            <img class="img-busca" src="https://www.svgrepo.com/show/509394/search.svg" alt="busca">
        </button>
        <div class="caixa-media">
            <h2 class="cidade"> Tempo em São Paulo</h2>
            <p class="temp">21°C</p>

            <div class="caixa-menor">
                <img class="img-previsao" src="https://openweathermap.org/img/wn/04n.png" alt="icone-tempo">
                <p class="texto-precisao">Nublado</p> 
            </div>
            <p class="umidade">Umidade: 70%</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
